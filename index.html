<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#141126" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Violet at Hogwarts" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <meta name="description" content="Violet's own storybook wizard adventure." />
    <title>Violet at Hogwarts</title>
  </head>
  <body>
    <main id="game-root">
      <canvas id="game" aria-label="Violet at Hogwarts"></canvas>
      <p id="game-status" class="visually-hidden" aria-live="polite">Loading Violet's adventure.</p>
      <aside id="version-reload" class="version-reload" aria-label="A game update is ready" hidden>
        <svg class="version-reload-owl" viewBox="0 0 64 64" aria-hidden="true">
          <path d="M12 18 23 9c6-3 12-3 18 0l11 9c3 17-4 31-20 39C16 49 9 35 12 18Z" />
          <ellipse cx="24" cy="26" rx="9" ry="10" /><ellipse cx="40" cy="26" rx="9" ry="10" />
          <circle cx="24" cy="26" r="3" /><circle cx="40" cy="26" r="3" />
          <path d="m28 35 4 5 4-5" />
        </svg>
        <span class="version-reload-copy">
          <strong>New magic is ready</strong>
          <span>Reload now, or keep playing this version.</span>
        </span>
        <span class="version-reload-actions">
          <button id="version-reload-now" type="button">Reload</button>
          <button id="version-reload-later" type="button">Later</button>
        </span>
      </aside>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
