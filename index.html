      <div class="boot-folio">
        <p class="boot-eyebrow">Violet at Hogwarts</p>
        <h1 id="boot-title" class="boot-title">Opening Violet’s storybook…</h1>
        <p id="boot-status" class="boot-status" role="status" aria-live="polite" aria-atomic="true">
          Finding Violet’s place at Hogwarts.
        </p>
        <div class="boot-page-marks" aria-hidden="true">
          <span></span><span></span><span></span><span></span><span></span>

        </svg>
      </div>
    </section>
    <script>
      (() => {
        const gameRoot = document.querySelector('#game-root');
        const gameStatus = document.querySelector('#game-status');
        const surface = document.querySelector('#boot-surface');
        const title = document.querySelector('#boot-title');
        const status = document.querySelector('#boot-status');
        const retry = document.querySelector('#boot-retry');
        const syncGameStatusAccessibility = () => {
          if (!gameStatus) return;
          if (gameRoot?.dataset.bootReady === 'true') gameStatus.removeAttribute('aria-hidden');
          else gameStatus.setAttribute('aria-hidden', 'true');
        };
        const showFallbackFailure = () => {
          if (!surface || gameRoot?.dataset.bootReady === 'true') return;
          surface.hidden = false;
          surface.dataset.state = 'error';
          if (surface.dataset.stage === 'starting') surface.dataset.stage = 'bootstrap';
          gameRoot?.setAttribute('aria-busy', 'false');
          if (title) title.textContent = 'The storybook paused.';
          if (status) status.textContent = 'A bit of magic went astray. Try opening it again.';
          if (retry) {
            retry.hidden = false;
            retry.disabled = false;
          }
        };

        syncGameStatusAccessibility();
        if (gameRoot && typeof MutationObserver === 'function') {
          new MutationObserver(syncGameStatusAccessibility).observe(gameRoot, {
            attributes: true,
            attributeFilter: ['data-boot-ready'],
          });
        }
        retry?.addEventListener('click', () => {
          const retryBoot = window.__violetRetryBoot;
          if (typeof retryBoot !== 'function') {
            window.location.reload();
            return;
          }
          try {
            void Promise.resolve(retryBoot()).catch(showFallbackFailure);
          } catch {
            showFallbackFailure();
          }
        });
        window.addEventListener('error', showFallbackFailure, true);
        window.addEventListener('unhandledrejection', showFallbackFailure);
      })();
    </script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
