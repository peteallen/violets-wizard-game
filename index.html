<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#141126" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Violet at Hogwarts" />
    <link rel="icon" type="image/png" sizes="64x64" href="./assets/art/ui/browser/owl-clasp-icon-v2-64.png" />
    <link rel="apple-touch-icon" type="image/png" sizes="180x180" href="./assets/art/ui/browser/owl-clasp-icon-v2-180.png" />
    <meta name="description" content="Violet's own storybook wizard adventure." />
    <title>Violet at Hogwarts</title>
  </head>
  <body>
    <main id="game-root">
      <canvas id="game" aria-label="Violet at Hogwarts"></canvas>
      <p id="game-status" class="visually-hidden" aria-live="polite">Loading Violet's adventure.</p>
      <aside id="version-reload" class="version-reload" aria-label="A game update is ready" hidden>
        <svg class="version-reload-owl" viewBox="0 0 64 64" aria-hidden="true">
          <path class="version-reload-owl-shadow" d="M13 20 23 10c7-4 13-3 19 1l10 9c3 17-5 31-19 38C17 52 9 37 13 20Z" />
          <path class="version-reload-owl-body" d="M11 18 23 8c7-3 14-2 19 2l11 9c2 18-5 31-21 38C16 50 8 35 11 18Z" />
          <path class="version-reload-owl-wing" d="M13 27c4 7 8 10 15 12-5 5-9 7-13 7-3-6-4-12-2-19ZM51 27c-4 7-8 10-15 12 5 5 9 7 13 7 3-6 4-12 2-19Z" />
          <path class="version-reload-owl-eye" d="M15 25c2-9 14-11 18-2 1 9-11 14-18 2ZM31 23c5-8 17-6 18 3-6 11-18 7-18-3Z" />
          <path class="version-reload-owl-iris" d="M21 25c1-5 7-5 9-1 0 5-6 7-9 1ZM36 24c2-4 8-3 9 1-2 5-8 5-9-1Z" />
          <path class="version-reload-owl-catchlight" d="M22 22c1-2 3-2 4 0-1 2-3 2-4 0ZM37 22c1-2 3-2 4 0-1 2-3 2-4 0Z" />
          <path class="version-reload-owl-beak" d="m27 34 5 6 5-6c-3-2-7-2-10 0Z" />
          <path class="version-reload-owl-feathers" d="M19 43q7 7 13 0 7 7 14 0" />
        </svg>
        <span class="version-reload-actions">
          <button id="version-reload-now" type="button">Reload</button>
          <button id="version-reload-later" type="button">Later</button>
        </span>
      </aside>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
